<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' http://localhost:* http://127.0.0.1:*; img-src 'self' data:; style-src 'self' 'unsafe-inline';">
  <title>Terrain Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242836;
      --border: #2e3346;
      --text: #e4e6f0;
      --text-dim: #8b8fa3;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.3);
      --success: #00cec9;
      --error: #ff6b6b;
      --radius: 8px;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
    }

    #sidebar {
      width: 300px;
      min-width: 300px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 0;
    }

    #sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    #sidebar-header p {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    #controls {
      padding: 16px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .control-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
    }

    .control-group label span {
      color: var(--text);
      font-weight: 500;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--surface-2);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: var(--accent);
    }

    #generate-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    #generate-btn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    #generate-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    #generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status-bar {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    #status {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
      word-break: break-word;
    }

    #status.loading {
      color: var(--accent);
    }

    #status.success {
      color: var(--success);
    }

    #status.error {
      color: var(--error);
    }

    #main {
      flex: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #000;
    }

    #main-wrapper {
      flex: 1;
      position: relative;
      display: flex;
    }

    #terrain-view {
      flex: 1;
      border: none;
    }

    #loading-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--text-dim);
      font-size: 14px;
      pointer-events: none;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>

<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Terrain Generator</h1>
      <p>Parametric 3D terrain</p>
    </div>
    <div id="controls">
      <div class="control-group">
        <label>Width <span id="width-value">100</span></label>
        <input type="range" id="width" min="20" max="300" value="100" step="10">
      </div>
      <div class="control-group">
        <label>Length <span id="length-value">100</span></label>
        <input type="range" id="length" min="20" max="300" value="100" step="10">
      </div>
      <div class="control-group">
        <label>Height Scale <span id="height-scale-value">20</span></label>
        <input type="range" id="height-scale" min="1" max="100" value="20" step="1">
      </div>
      <div class="control-group">
        <label>Feature Scale <span id="scale-value">50</span></label>
        <input type="range" id="scale" min="5" max="200" value="50" step="5">
      </div>
      <div class="control-group">
        <label>Octaves <span id="octaves-value">4</span></label>
        <input type="range" id="octaves" min="1" max="10" value="4" step="1">
      </div>
      <div class="control-group">
        <label>Roughness <span id="roughness-value">0.5</span></label>
        <input type="range" id="roughness" min="0.1" max="1.0" value="0.5" step="0.05">
      </div>
      <div class="control-group">
        <label>Seed</label>
        <input type="number" id="seed" min="0" max="999999" value="42">
      </div>
      <button id="generate-btn">Generate</button>
    </div>
    <div id="status-bar">
      <div id="status">Ready</div>
    </div>
  </div>
  <div id="main">
    <div id="main-wrapper">
      <webview id="terrain-view" src="about:blank"></webview>
      <div id="loading-overlay">Generate terrain to visualize</div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>

</html>
