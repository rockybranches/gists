name: Build Binaries

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build standalone binary
        run: |
          cd generate-terrain.py
          ./scripts/build-standalone-binary.sh

      - name: Upload standalone binary
        uses: actions/upload-artifact@v4
        with:
          name: standalone-binary
          path: generate-terrain.py/dist/gui