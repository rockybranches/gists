name: Build Binaries

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-standalone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build standalone binary
        run: ./scripts/build-standalone-binary.sh

      - name: Upload standalone binary
        uses: actions/upload-artifact@v4
        with:
          name: standalone-binary
          path: dist/gui

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build windows binary
        run: ./scripts/build-windows-binary.sh

      - name: Upload windows binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/gui.exe
